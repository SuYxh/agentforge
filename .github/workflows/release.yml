name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - { os: macos-latest, target: aarch64-apple-darwin, args: "--target aarch64-apple-darwin" }
          - { os: macos-latest, target: x86_64-apple-darwin, args: "--target x86_64-apple-darwin" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, args: "" }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu, args: "" }

    runs-on: ${{ matrix.settings.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev libssl-dev patchelf

      - name: Build frontend
        run: pnpm build:frontend

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: '.'
          tauriScript: 'pnpm tauri'
          args: ${{ matrix.settings.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "AgentForge v__VERSION__"
          releaseBody: "See [CHANGELOG](https://github.com/SuYxh/agentforge/blob/main/CHANGELOG.md)"
          releaseDraft: true
          prerelease: false

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
